<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>404 - Page Not Found | Domapus</title>

  <script>
    (function () {
      var search = window.location.search;
      var hash   = window.location.hash;
      if (search || hash) {
        sessionStorage.setItem('redirectPath', window.location.pathname + search + hash);
        window.location.replace('/Domapus/' + search + hash);
      }
    })();
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #f3f4f6;
      color: #1f2937;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }
    .code {
      font-size: 6rem;
      font-weight: 800;
      line-height: 1;
      color: #d1d5db;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.75rem;
    }
    p {
      color: #6b7280;
      margin: 0 0 1.5rem;
      line-height: 1.5;
    }
    a.btn {
      display: inline-block;
      padding: 0.625rem 1.5rem;
      background-color: #3b82f6;
      color: #fff;
      border-radius: 0.375rem;
      text-decoration: none;
      font-weight: 500;
      transition: background-color 0.15s;
    }
    a.btn:hover {
      background-color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a class="btn" href="/Domapus/">Back to Domapus</a>
  </div>
</body>
</html>
